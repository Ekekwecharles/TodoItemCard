<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>todoitemcard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <main class="app__main">
        <article
          data-testid="test-todo-card"
          class="todo-card"
        >
          <div class="todo-card__stack">
            <div class="todo-card__title-row">
              <h2 data-testid="test-todo-title" class="todo-card__title">
                Ship the testable todo card
              </h2>

              <div class="todo-card__complete">
                <input
                  id="todo-complete-toggle"
                  type="checkbox"
                  data-testid="test-todo-complete-toggle"
                  class="todo-card__checkbox"
                />
                <label
                  for="todo-complete-toggle"
                  class="todo-card__checkbox-label"
                >
                  Mark complete
                </label>
              </div>
            </div>

            <p
              data-testid="test-todo-description"
              class="todo-card__description"
            >
              Semantic markup, exact data-testid values, keyboard support, and a
              polite live region for the countdown hint.
            </p>

            <div class="todo-card__meta">
              <span data-testid="test-todo-priority" class="badge badge--medium">
                Medium
              </span>
              <strong data-testid="test-todo-status" class="todo-card__status">
                In Progress
              </strong>
            </div>

            <div class="todo-card__due">
              <time
                data-testid="test-todo-due-date"
                class="todo-card__due-label"
              ></time>
              <span aria-live="polite" class="todo-card__timehint-wrap">
                <time
                  data-testid="test-todo-time-remaining"
                  class="todo-card__timehint"
                ></time>
              </span>
            </div>

            <ul
              data-testid="test-todo-tags"
              role="list"
              class="todo-card__tags"
            >
              <li>
                <span data-testid="test-todo-tag-work" class="tag">work</span>
              </li>
              <li>
                <span data-testid="test-todo-tag-urgent" class="tag">urgent</span>
              </li>
              <li>
                <span data-testid="test-todo-tag-design" class="tag">design</span>
              </li>
            </ul>

            <div class="todo-card__actions">
              <button
                type="button"
                data-testid="test-todo-edit-button"
                class="btn btn--neutral"
              >
                Edit
              </button>
              <button
                type="button"
                data-testid="test-todo-delete-button"
                class="btn btn--danger"
              >
                Delete
              </button>
            </div>
          </div>
        </article>
      </main>
    </div>

    <script type="module" src="./script.js"></script>
  </body>
</html>
